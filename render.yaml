services:
  - type: web
    name: taxi-tour-backend
    env: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 3000
      - key: FRONTEND_ORIGIN
        value: https://your-vercel-app.vercel.app
      - key: ADMIN_EMAIL
        value: contact@example.com
